workflows:
  unity-ios-unsigned:
    name: Unity Unsigned Build
    instance_type: mac_mini_m2
    scripts:
      - name: Build Unsigned IPA
        script: |
          # This builds the app without looking for Apple Certificates
          xcodebuild build \
            -project "Client_Test_Ios/Unity-iPhone.xcodeproj" \
            -scheme "Unity-iPhone" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
      - name: Package to IPA
        script: |
          # This manually zips the result into a format your sideloader understands
          mkdir -p build/ios/ipa/Payload
          cp -r build/Release-iphoneos/Unity-iPhone.app build/ios/ipa/Payload/
          cd build/ios/ipa && zip -r unsigned_app.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa