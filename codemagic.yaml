workflows:
  xcode-to-ipa:
    name: Convert Xcode to IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    scripts:
      - name: Fix Windows Paths & Setup Pods
        script: |
          PBXPROJ="Client_Test_Ios/Unity-iPhone.xcodeproj/project.pbxproj"

          # Fix the one broken entitlements path
          sed -i '' 's|path = "C:/.Dev/KiemSon_aNam/_BuildClient/IOS_ver3/KiemSonMobile.entitlements";|path = KiemSonMobile.entitlements;|g' "$PBXPROJ"

          # Verify
          echo ">> Checking for leftover Windows paths:"
          grep "C:/" "$PBXPROJ" && echo ">> WARNING: Windows paths still found!" || echo ">> Clean - no Windows paths found"

          cd Client_Test_Ios
          chmod +x MapFileParser.sh
          chmod +x MapFileParser.py
          pod install

      - name: Build IPA from Xcode Workspace
        script: |
          cd Client_Test_Ios

          xcodebuild -workspace Unity-iPhone.xcworkspace \
            -scheme Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            build

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -path "*/Release-iphoneos/*" | grep -v ".appex" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            exit 1
          fi

          echo "Found: $APP_PATH"

          cd $CM_BUILD_DIR
          rm -rf Payload
          mkdir Payload
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload
          ls -lh app.ipa

    artifacts:
      - app.ipa