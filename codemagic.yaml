workflows:
  unity-ios-unsigned:
    name: Unity Unsigned Build
    instance_type: mac_mini_m2
    scripts:
      - name: Fetch Large Files (LFS)
        script: |
          git lfs pull
      - name: Build Unsigned IPA
        script: |
          xcodebuild build \
            -project "Client_Test_Ios/Unity-iPhone.xcodeproj" \
            -scheme "Unity-iPhone" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
      - name: Package to IPA
        script: |
          mkdir -p build/ipa/Payload
          cp -r build/Build/Products/Release-iphoneos/Unity-iPhone.app build/ipa/Payload/
          cd build/ipa && zip -r unsigned_app.ipa Payload
    artifacts:
      - build/ipa/*.ipa