workflows:
  xcode-to-ipa:
    name: Convert Xcode to IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    scripts:
      - name: Fix Windows Paths & Setup Pods
        script: |
          PBXPROJ="Client_Test_Ios/Unity-iPhone.xcodeproj/project.pbxproj"
          
          # Fix forward-slash version of the Windows path
          sed -i '' 's|C:/.Dev/KiemSon_aNam/_BuildClient/Client_Test_IOS_ver2/||g' "$PBXPROJ"
          
          # Fix backslash version (escaped for sed)
          sed -i '' 's|C:\\\.Dev\\KiemSon_aNam\\_BuildClient\\Client_Test_IOS_ver2\\||g' "$PBXPROJ"
          
          # Normalize any remaining backslashes to forward slashes
          sed -i '' 's|\\\\|/|g' "$PBXPROJ"
          sed -i '' 's|\\|/|g' "$PBXPROJ"
          
          # Verify the fix worked - should return empty if path is gone
          echo ">> Checking for leftover Windows paths:"
          grep "C:/" "$PBXPROJ" || echo ">> Clean - no Windows paths found"
          
          cd Client_Test_Ios
          chmod +x MapFileParser.sh
          chmod +x MapFileParser.py
          pod install

      - name: Build IPA from Xcode Workspace
        script: |
          cd Client_Test_Ios
          
          xcodebuild -workspace Unity-iPhone.xcworkspace \
            -scheme Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            build
          
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -path "*/Release-iphoneos/*" | grep -v ".appex" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            exit 1
          fi
          
          echo "Found: $APP_PATH"
          
          cd $CM_BUILD_DIR
          rm -rf Payload
          mkdir Payload
          cp -r "$APP_PATH" Payload/
          zip -r app.ipa Payload
          ls -lh app.ipa

    artifacts:
      - app.ipa