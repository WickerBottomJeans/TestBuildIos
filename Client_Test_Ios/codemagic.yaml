workflows:
  unity-ios-workflow:
    name: Unity iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest # Uses Xcode 26.x
      groups:
        - certificate_credentials # We will create this in the next step
    scripts:
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Set up Provisioning Profiles
        script: |
          # This pulls the profile you will upload to the web UI later
          xcode-project use-profiles
      - name: Build IPA
        script: |
          # This command turns your folder into the actual app file
          xcode-project build-ipa \
            --project "Unity-iPhone.xcodeproj" \
            --scheme "Unity-iPhone"
    artifacts:
      - build/ios/ipa/*.ipa